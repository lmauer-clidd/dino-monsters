<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jurassic Trainers</title>

  <!-- Google Fonts: Press Start 2P (pixel art font) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />

  <style>
    /* Fallback @font-face in case Google Fonts is unavailable */
    @font-face {
      font-family: 'Press Start 2P';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: local('Press Start 2P'), local('PressStart2P-Regular');
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #181018;
      -webkit-overflow-scrolling: touch;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    html::-webkit-scrollbar,
    body::-webkit-scrollbar {
      display: none;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      image-rendering: -moz-crisp-edges;
      -ms-interpolation-mode: nearest-neighbor;
    }

    /* Prevent text selection on mobile */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Landscape orientation hint for mobile */
    @media screen and (orientation: portrait) and (max-width: 768px) {
      body::after {
        content: 'Please rotate your device to landscape mode';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #181018;
        color: #F0E8D0;
        font-family: 'Press Start 2P', 'Courier New', monospace;
        font-size: 12px;
        text-align: center;
        padding: 2rem;
        z-index: 99999;
        line-height: 1.8;
      }
    }
  </style>
</head>
<body>
  <script type="module" src="./main.ts"></script>
</body>
</html>
